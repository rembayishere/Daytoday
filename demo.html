<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daytoday · 交互预览</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
  --bg-page: #ffffff;
  --bg-sidebar: #f8f9fa;
  --bg-sidebar-section: #f1f3f5;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --bg-overlay: rgba(0,0,0,0.3);
  --bg-code: #f8f9fa;
  --border: #e5e7eb;
  --border-light: #f3f4f6;
  --border-input: #d1d5db;
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --text-placeholder: #d1d5db;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-light: #eff6ff;
  --accent-ring: rgba(59,130,246,0.2);
  --accent-ring-strong: rgba(59,130,246,0.4);
  --btn-primary-bg: #3b82f6;
  --btn-primary-text: #ffffff;
  --btn-primary-hover: #2563eb;
  --btn-secondary-bg: #f3f4f6;
  --btn-secondary-text: #374151;
  --btn-secondary-hover: #e5e7eb;
  --btn-ghost-text: #6b7280;
  --btn-ghost-hover: #f3f4f6;
  --nav-hover: #f3f4f6;
  --nav-active-bg: #eff6ff;
  --nav-active-text: #1e40af;
  --nav-active-icon: #3b82f6;
  --nav-icon: #9ca3af;
  --scrollbar-thumb: #d1d5db;
  --tag-bg: #eff6ff;
  --tag-text: #3b82f6;
  --heat-lv0: #eaf0f8;
  --heat-lv1: #dbeafe;
  --heat-lv2: #93c5fd;
  --heat-lv3: #3b82f6;
  --heat-lv4: #1d4ed8;
  --heat-hover-shadow: rgba(59,130,246,0.5);
  --status-open-bg: #fef2f2;
  --status-open-text: #ef4444;
  --status-progress-bg: #fffbeb;
  --status-progress-text: #f59e0b;
  --status-answered-bg: #ecfdf5;
  --status-answered-text: #10b981;
  --priority-high: #ef4444;
  --priority-medium: #f59e0b;
  --priority-low: #10b981;
  --flip-bg: #ffffff;
  --flip-border: #e5e7eb;
  --filtered-highlight-bg: rgba(59,130,246,0.08);
  --filtered-highlight-border: rgba(59,130,246,0.4);
  --file-icon: #6b7280;
  --fab-shadow: rgba(59,130,246,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui,'Segoe UI',Roboto,'Helvetica Neue','Noto Sans SC',sans-serif; background:#e9edf2; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:20px; }
.demo-window { width:100%; max-width:1450px; height:calc(100vh - 40px); background:var(--bg-page); border-radius:18px; box-shadow:0 25px 60px -12px rgba(0,0,0,0.25); overflow:hidden; display:flex; flex-direction:column; border:1px solid var(--border); }
.titlebar { background:var(--bg-sidebar); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; user-select:none; }
.titlebar-left { display:flex; gap:10px; align-items:center; }
.dot { width:12px; height:12px; border-radius:50%; }
.dot.red { background:#ef4444; } .dot.yellow { background:#eab308; } .dot.green { background:#22c55e; }
.app-title { font-weight:600; color:var(--text-primary); margin-left:12px; font-size:.95rem; letter-spacing:.3px; }
.tray-icon { color:var(--text-muted); font-size:1.2rem; cursor:pointer; }
.main-layout { display:flex; flex:1; min-height:0; }
.sidebar { width:300px; background:var(--bg-sidebar); border-right:1px solid var(--border); padding:18px 16px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 14px; border-radius:10px; color:var(--text-secondary); font-weight:500; font-size:.875rem; transition:all .15s; cursor:pointer; background:transparent; border:none; width:100%; text-align:left; }
.nav-item i { width:20px; font-size:.95rem; color:var(--nav-icon); }
.nav-item.active { background:var(--nav-active-bg); font-weight:700; color:var(--nav-active-text); }
.nav-item.active i { color:var(--nav-active-icon); }
.nav-item:hover { background:var(--nav-hover); }
.sidebar-spacer { flex:1; }
.sidebar-heatmap-section { margin-top:8px; padding:12px 12px 10px; background:var(--bg-sidebar-section); border-radius:12px; border:1px solid var(--border); flex-shrink:0; }
.heatmap-title { display:flex; align-items:center; gap:6px; font-weight:600; font-size:.78rem; color:var(--text-primary); margin-bottom:6px; }
.heatmap-title i { color:var(--accent); font-size:.85rem; }
.heatmap-body { display:flex; gap:3px; }
.heat-col { display:flex; flex-direction:column; gap:3px; flex:1; }
.heat-cell { flex:1; aspect-ratio:1; border-radius:3px; background:var(--heat-lv0); cursor:pointer; transition:transform .15s; }
.heat-cell:hover { transform:scale(1.4); box-shadow:0 0 0 2px var(--heat-hover-shadow); }
.heat-cell.lv1 { background:var(--heat-lv1); } .heat-cell.lv2 { background:var(--heat-lv2); } .heat-cell.lv3 { background:var(--heat-lv3); } .heat-cell.lv4 { background:var(--heat-lv4); }
.content-panel { flex:1; display:flex; flex-direction:column; background:var(--bg-page); overflow:hidden; min-width:0; }
.top-bar { padding:10px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); flex-shrink:0; min-height:52px; }
.sbox { flex:1; max-width:280px; background:var(--bg-sidebar); border-radius:10px; padding:7px 14px; border:1px solid var(--border); display:flex; align-items:center; gap:6px; color:var(--text-muted); }
.sbox input { background:transparent; border:none; outline:none; font-size:.85rem; width:100%; color:var(--text-primary); }
.sbox input::placeholder { color:var(--text-placeholder); }
.pc { flex:1; padding:18px 20px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; min-height:0; }
.st { font-size:.95rem; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:6px; flex-shrink:0; }
.em { text-align:center; padding:25px; color:var(--text-muted); font-size:.85rem; }
.btn { display:inline-flex; align-items:center; gap:6px; border-radius:10px; border:none; cursor:pointer; font-weight:500; transition:all .15s; font-size:.78rem; line-height:1.4; text-decoration:none; }
.btn-primary { background:var(--btn-primary-bg); color:var(--btn-primary-text); padding:8px 20px; } .btn-primary:hover { background:var(--btn-primary-hover); box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.btn-secondary { background:var(--btn-secondary-bg); color:var(--btn-secondary-text); padding:6px 16px; } .btn-secondary:hover { background:var(--btn-secondary-hover); }
.btn-ghost { background:transparent; color:var(--btn-ghost-text); padding:4px 12px; } .btn-ghost:hover { background:var(--btn-ghost-hover); }
.mo { position:fixed; inset:0; background:var(--bg-overlay); display:none; align-items:center; justify-content:center; z-index:200; }
.mo.op { display:flex; }
.mb { background:var(--bg-card); border-radius:12px; padding:18px; width:440px; max-width:90vw; box-shadow:0 12px 40px rgba(0,0,0,0.15); }
.ni { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; flex-shrink:0; }
.ni textarea { width:100%; min-height:68px; border:none; outline:none; font-size:.88rem; line-height:1.6; resize:vertical; font-family:inherit; background:transparent; color:var(--text-primary); }
.ni textarea::placeholder { color:var(--text-placeholder); }
.nl { display:flex; flex-direction:column; gap:6px; flex:1; overflow-y:auto; }
.nm { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; }
.nm .tx { flex:1; font-size:.85rem; line-height:1.5; white-space:pre-wrap; word-break:break-word; color:var(--text-primary); }
.nm .tx .tag { color:var(--tag-text); font-weight:500; }
.nm .tm { display:flex; align-items:center; gap:6px; font-size:.68rem; color:var(--text-muted); margin-top:3px; }
.sg { display:flex; flex-wrap:wrap; gap:14px; }
.sc { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; width:240px; }
.cg { display:flex; gap:14px; flex-wrap:wrap; }
.cp { background:var(--bg-sidebar); border-radius:12px; padding:12px; width:220px; border:1px solid var(--border); }
.cv { background:var(--bg-sidebar-section); height:60px; border-radius:10px; margin-bottom:6px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:.78rem; }
.ql { display:flex; flex-direction:column; gap:10px; flex:1; overflow-y:auto; }
.qc { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px; }
.qh { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
.qt { flex:1; font-weight:600; color:var(--text-primary); font-size:.9rem; }
.qs { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:16px; font-size:.68rem; font-weight:500; }
.s0 { background:var(--status-open-bg); color:var(--status-open-text); } .s1 { background:var(--status-answered-bg); color:var(--status-answered-text); } .s2 { background:var(--status-progress-bg); color:var(--status-progress-text); }
.qd { color:var(--text-secondary); font-size:.82rem; }
.fg { display:flex; flex-direction:column; gap:8px; flex:1; overflow-y:auto; }
.fi { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.fi .front { font-weight:600; font-size:.88rem; color:var(--text-primary); }
.fi .back { font-size:.82rem; color:var(--text-secondary); margin-top:4px; display:none; }
.fi .back.show { display:block; }
.fi .meta { font-size:.68rem; color:var(--text-muted); margin-top:6px; }
.kb { display:flex; gap:14px; flex:1; min-height:180px; }
.kc { flex:1; background:var(--bg-sidebar); border-radius:12px; padding:12px; display:flex; flex-direction:column; }
.kc .ch { font-weight:600; margin-bottom:8px; font-size:.82rem; }
.kc .cb { flex:1; display:flex; flex-direction:column; gap:5px; min-height:50px; }
.tk { background:var(--bg-card); border-radius:10px; padding:8px 10px; border:1px solid var(--border); display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--text-primary); }
.pd { width:8px; height:8px; border-radius:50%; flex-shrink:0; } .pd.h { background:var(--priority-high); } .pd.m { background:var(--priority-medium); } .pd.l { background:var(--priority-low); }
.sf { max-width:560px; display:flex; flex-direction:column; gap:14px; }
.sg2 { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px; }
.sg2 h4 { font-size:.88rem; color:var(--text-primary); margin-bottom:10px; }
.sg2 label { font-size:.78rem; color:var(--text-secondary); display:block; margin-bottom:3px; }
.sg2 input { width:100%; padding:7px 10px; border:1px solid var(--border-input); border-radius:10px; font-size:.82rem; background:var(--bg-input); outline:none; margin-bottom:8px; color:var(--text-primary); }
.sg2 input:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-ring); }
.fab { position:fixed; bottom:34px; right:34px; width:50px; height:50px; border-radius:50%; background:var(--btn-primary-bg); color:white; border:none; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 20px var(--fab-shadow); z-index:100; }
.fab:hover { transform:scale(1.05); }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:3px; }
input:focus { border-color:var(--accent); }

/* Files (资料) */
.file-upload-bar { display:flex; align-items:center; gap:10px; background:var(--bg-sidebar); border-radius:12px; padding:12px 14px; border:2px dashed var(--border); flex-shrink:0; }
.file-hint { font-size:.72rem; color:var(--text-muted); }
.cloud-att-list { margin:10px 0 4px; background:var(--bg-sidebar); border:1px solid var(--border); border-radius:12px; padding:10px 12px; }
.cloud-att-head { display:flex; align-items:center; justify-content:space-between; font-size:.76rem; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
.cloud-att-item { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:8px; font-size:.78rem; color:var(--text-primary); }
.cloud-att-item:hover { background:var(--btn-secondary-bg); }
.cloud-att-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cloud-att-size { font-size:.68rem; color:var(--text-muted); white-space:nowrap; }
.cloud-att-badge { font-size:.64rem; padding:1px 7px; border-radius:8px; white-space:nowrap; }
.cloud-att-badge.local { background:var(--accent-light); color:var(--accent); }
.cloud-att-badge.remote { background:#fdecec; color:#c0392b; }
.file-list { display:flex; flex-direction:column; gap:6px; flex:1; overflow-y:auto; }
.file-item { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; position:relative; }
.file-item:hover { border-color:var(--text-muted); }
.file-item.file-missing { opacity:.6; }
.file-missing-badge { color:var(--priority-high); font-weight:600; }
.file-icon { font-size:1.2rem; color:var(--file-icon); padding-top:2px; }
.file-info { flex:1; min-width:0; }
.file-name { font-weight:600; font-size:.82rem; color:var(--text-primary); }
.file-meta { display:flex; gap:10px; font-size:.65rem; color:var(--text-muted); margin-top:2px; flex-wrap:wrap; }
.file-notes { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.file-note-tag { background:var(--btn-secondary-bg); border-radius:8px; padding:1px 8px; font-size:.65rem; color:var(--text-secondary); display:inline-flex; align-items:center; gap:4px; }
.file-actions { display:flex; gap:4px; flex-shrink:0; opacity:0; transition:opacity .15s; }
.file-item:hover .file-actions { opacity:1; }
.file-actions button { padding:3px 10px; font-size:.68rem; }
.file-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-shrink:0; }
.file-cur-label { font-size:.72rem; color:var(--text-muted); }
.file-search-box { display:flex; align-items:center; gap:6px; background:var(--bg-input); border:1px solid var(--border-input); border-radius:999px; padding:4px 12px; flex:1; min-width:0; color:var(--text-muted); }
.file-search-box input { border:none; background:transparent; outline:none; color:var(--text-primary); font-size:.74rem; flex:1; min-width:0; }
.file-folder-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; flex-shrink:0; margin-bottom:10px; }
.file-folders { display:flex; gap:6px; flex-wrap:wrap; align-items:center; flex:1; }
.file-capsule { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:.74rem; color:var(--btn-secondary-text); background:var(--btn-secondary-bg); cursor:pointer; transition:all .15s; white-space:nowrap; }
.file-capsule:hover { background:var(--btn-secondary-hover); }
.file-capsule.active { background:var(--accent); color:#fff; }
.file-capsule.active .color-dot { background:#fff !important; }
.file-capsule.capsule-add { border:1px dashed var(--border-input); background:transparent; }
.file-capsule.capsule-add:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
.color-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
.file-capsule-input { border:1px solid var(--accent); border-radius:999px; padding:5px 12px; font-size:.74rem; background:var(--bg-input); color:var(--text-primary); outline:none; width:130px; }
.file-capsule-input-wrap { display:inline-flex; align-items:center; gap:4px; }
.file-manage-panel { background:var(--bg-sidebar); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:10px; }
.file-manage-head { display:flex; justify-content:space-between; align-items:center; font-size:.72rem; font-weight:600; color:var(--text-secondary); margin-bottom:6px; gap:10px; }
.file-manage-hint { font-size:.66rem; color:var(--text-muted); font-weight:400; }
.file-manage-row { display:flex; align-items:center; gap:8px; padding:5px 4px; border-radius:8px; }
.file-manage-row:hover { background:var(--btn-secondary-bg); }
.manage-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.manage-name { flex:1; font-size:.8rem; color:var(--text-primary); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.manage-count { font-size:.68rem; color:var(--text-muted); }
.file-manage-row .m-btn { padding:3px 9px; font-size:.68rem; }
.file-batch-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex-shrink:0; background:var(--bg-sidebar); border:1px solid var(--border); border-radius:12px; padding:8px 12px; margin:6px 0; }
.file-batch-all { display:inline-flex; align-items:center; gap:5px; font-size:.72rem; color:var(--text-secondary); cursor:pointer; }
.file-batch-all i { color:var(--accent); }
.file-batch-count { font-size:.72rem; color:var(--text-muted); }
.file-batch-actions { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
.file-batch-actions button { padding:4px 10px; font-size:.7rem; }
.file-item.selected { border-color:var(--accent); background:var(--accent-light); }
.file-select-box { font-size:1rem; color:var(--accent); padding-top:2px; flex-shrink:0; }
.folder-picker-list { max-height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; margin:8px 0; }
.picker-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:9px; cursor:pointer; font-size:.8rem; color:var(--text-primary); }
.picker-item:hover { background:var(--btn-secondary-bg); }
.picker-item .num { margin-left:auto; font-size:.68rem; color:var(--text-muted); }
.picker-new { display:flex; gap:6px; margin-top:8px; }
.picker-new input { flex:1; border:1px solid var(--border-input); border-radius:9px; padding:6px 10px; font-size:.78rem; background:var(--bg-input); color:var(--text-primary); outline:none; }
.note-link-list { max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
.note-link-row { display:flex; align-items:center; gap:8px; padding:6px 8px; cursor:pointer; border-radius:8px; font-size:.82rem; color:var(--text-primary); }
.note-link-row:hover { background:var(--btn-secondary-bg); }
.note-link-row.linked { background:var(--accent-light); }
.note-link-row i { color:var(--accent); width:18px; text-align:center; }
</style>
</head>
<body>
<div class="demo-window">
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      <span class="app-title">Daytoday</span>
    </div>
    <i class="fas fa-gear tray-icon" title="设置"></i>
  </div>
  <div class="main-layout">
    <div class="sidebar">
      <button class="nav-item active" data-panel="notes"><i class="fas fa-pen"></i><span>笔记</span></button>
      <button class="nav-item" data-panel="summary"><i class="fas fa-layer-group"></i><span>智能总结</span></button>
      <button class="nav-item" data-panel="clips"><i class="fas fa-paperclip"></i><span>剪藏</span></button>
      <button class="nav-item" data-panel="files"><i class="fas fa-folder-open"></i><span>资料</span></button>
      <button class="nav-item" data-panel="questions"><i class="fas fa-question-circle"></i><span>问题追踪</span></button>
      <button class="nav-item" data-panel="flashcards"><i class="fas fa-clone"></i><span>闪记卡片</span></button>
      <button class="nav-item" data-panel="tasks"><i class="fas fa-tasks"></i><span>任务看板</span></button>
      <div class="sidebar-spacer"></div>
      <button class="nav-item" data-panel="settings"><i class="fas fa-cog"></i><span>设置</span></button>
      <div class="sidebar-heatmap-section">
        <div class="heatmap-title"><i class="fas fa-fire"></i><span>活跃度</span></div>
        <div class="heatmap-body" id="heatmap"></div>
      </div>
    </div>
    <div class="content-panel">
      <div class="top-bar">
        <div class="sbox"><i class="fas fa-search"></i><input type="text" placeholder="搜索..."></div>
      </div>
      <div class="pc" id="pc"></div>
    </div>
  </div>
  <button class="fab" title="快速记录"><i class="fas fa-bolt"></i></button>
</div>

<!-- 移动到文件夹弹窗 -->
<div class="mo" id="moveModal">
  <div class="mb">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><i class="fas fa-arrow-right" style="color:var(--accent)"></i><strong style="font-size:.95rem">移动到文件夹</strong></div>
    <div class="folder-picker-list" id="moveList"></div>
    <div class="picker-new"><input id="pickerNew" placeholder="新建文件夹..."><button class="btn btn-primary" onclick="createAndMove()">新建并移动</button></div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn btn-ghost" onclick="closeModal('moveModal')">取消</button></div>
  </div>
</div>

<!-- 删除文件夹弹窗 -->
<div class="mo" id="delFolderModal">
  <div class="mb">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><i class="fas fa-exclamation-triangle" style="color:var(--priority-high)"></i><strong style="font-size:.95rem" id="delFolderTitle">删除文件夹</strong></div>
    <p style="font-size:.8rem;color:var(--text-secondary);line-height:1.6;margin:0 0 12px" id="delFolderDesc"></p>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost" onclick="closeModal('delFolderModal')">取消</button>
      <button class="btn btn-secondary" onclick="confirmDelFolder('move_root')">资料移回未分类</button>
      <button class="btn btn-primary" style="background:var(--priority-high)" onclick="confirmDelFolder('delete')">连同资料删除</button>
    </div>
  </div>
</div>

<!-- 删除资料确认弹窗 -->
<div class="mo" id="delModal">
  <div class="mb">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><i class="fas fa-exclamation-triangle" style="color:var(--priority-high)"></i><strong style="font-size:.95rem">确认删除</strong></div>
    <div style="font-size:.8rem;color:var(--text-secondary);line-height:1.6" id="delModalDesc"></div>
    <ul id="delModalList" style="margin:8px 0;padding-left:18px;font-size:.74rem;color:var(--text-muted)"></ul>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal('delModal')">取消</button>
      <button class="btn btn-primary" style="background:var(--priority-high)" onclick="confirmDel()"><i class="fas fa-trash"></i> 删除</button>
    </div>
  </div>
</div>

<!-- 关联笔记弹窗 -->
<div class="mo" id="linkModal">
  <div class="mb">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <strong style="font-size:.9rem" id="linkTitle">关联笔记</strong>
      <button class="btn btn-ghost" onclick="closeModal('linkModal')"><i class="fas fa-times"></i></button>
    </div>
    <input id="linkSearch" placeholder="搜索笔记..." style="width:100%;padding:7px 10px;border:1px solid var(--border-input);border-radius:10px;font-size:.82rem;margin-bottom:8px">
    <div class="note-link-list" id="linkList"></div>
  </div>
</div>

<script>
// ===== 演示数据 =====
const NOTES = [
  { id:1, text:'#今天 完成了 Daytoday 资料库重构，支持文件夹分类了', time:'今天 09:12' },
  { id:2, text:'#灵感 把散落的文件统一归档到「工作」和「学习」', time:'今天 14:30' },
  { id:3, text:'读书笔记：本地优先应用的同步策略，WebDAV 最稳妥', time:'昨天 21:05' },
]
const REMOTE = [
  { filename:'年度总结.pdf', size:2480000, exists_local:true },
  { filename:'会议纪要.docx', size:184000, exists_local:false },
  { filename:'设计稿-v3.png', size:1024000, exists_local:true },
]
// 资料：folder 为空表示「未分类」
const ATTACHMENTS = [
  { id:1, filename:'Daytoday-资料库设计稿.fig', size:5120000, created:'2026-07-15', folder:'工作', note_ids:[2] },
  { id:2, filename:'周报模板.docx', size:64000, created:'2026-07-16', folder:'工作', note_ids:[] },
  { id:3, filename:'算法笔记.pdf', size:1280000, created:'2026-07-17', folder:'学习', note_ids:[3] },
  { id:4, filename:'随手拍-灵感.jpg', size:240000, created:'2026-07-18', folder:'', note_ids:[] },
  { id:5, filename:'导出数据.zip', size:880000, created:'2026-07-18', folder:'', note_ids:[] },
]
const FOLDER_COLORS = { '工作':'#aa3bff', '学习':'#2bb3a3' }
const folderColor = f => FOLDER_COLORS[f] || '#aa3bff'
const fmt = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'
const ACTIVE_ALL = '__all__'

const state = {
  panel:'notes',
  activeFolder:'',
  fileSearch:'',
  selectMode:false,
  selected:new Set(),
  manageOpen:false,
  addingFolder:false,
  newFolder:'',
  renameFolder:null,
  renameVal:'',
}

// ===== 导航 =====
document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'))
    n.classList.add('active')
    state.panel = n.dataset.panel
    render()
  })
})

// ===== 热力图 =====
(function(){
  const hm = document.getElementById('heatmap')
  let html = ''
  for (let c=0; c<7; c++){
    html += '<div class="heat-col">'
    for (let r=0; r<5; r++){
      const lv = (c*5+r) % 6
      const cls = lv===0 ? '' : 'lv'+Math.min(lv,4)
      html += '<div class="heat-cell '+cls+'"></div>'
    }
    html += '</div>'
  }
  hm.innerHTML = html
})()

// ===== 渲染 =====
function render(){
  const pc = document.getElementById('pc')
  let html = ''
  switch(state.panel){
    case 'notes': html = notesPanel(); break
    case 'summary': html = summaryPanel(); break
    case 'clips': html = clipsPanel(); break
    case 'files': html = filesPanel(); break
    case 'questions': html = questionsPanel(); break
    case 'flashcards': html = flashcardsPanel(); break
    case 'tasks': html = tasksPanel(); break
    case 'settings': html = settingsPanel(); break
  }
  pc.innerHTML = html
  afterRender()
}

function notesPanel(){
  const items = NOTES.map(n => `<div class="nm"><div class="tx">${n.text.replace(/(#\S+)/g,'<span class="tag">$1</span>')}<div class="tm">${n.time}</div></div></div>`).join('')
  return `<div class="st">笔记</div>
    <div class="ni"><textarea placeholder="写点什么… 支持 #标签，Ctrl+Enter 发送"></textarea></div>
    <div class="nl">${items}</div>`
}
function summaryPanel(){
  return `<div class="st">智能总结</div>
    <div class="sg">
      <div class="sc"><div style="font-weight:600;font-size:.85rem">#灵感</div><div style="color:var(--text-muted);font-size:.75rem;margin-top:4px">3 条 · 把灵感沉淀成资料</div></div>
      <div class="sc"><div style="font-weight:600;font-size:.85rem">#今天</div><div style="color:var(--text-muted);font-size:.75rem;margin-top:4px">1 条 · 资料库重构完成</div></div>
    </div>`
}
function clipsPanel(){
  return `<div class="st">剪藏</div>
    <div class="cg">
      <div class="cp"><div class="cv"><i class="fas fa-link"></i></div><div style="font-size:.78rem">WebDAV 同步协议详解</div></div>
      <div class="cp"><div class="cv"><i class="fas fa-link"></i></div><div style="font-size:.78rem">本地优先应用设计</div></div>
    </div>`
}
function questionsPanel(){
  return `<div class="st">问题追踪</div>
    <div class="ql">
      <div class="qc"><div class="qh"><i class="fas fa-circle" style="color:var(--priority-high);font-size:.7rem;margin-top:4px"></i><div class="qt">如何保证资料上传后真实落盘？</div><i class="fas fa-circle s0" style="color:var(--status-open-text);font-size:.6rem"></i></div><div class="qd">上传后通过 PROPFIND 读取云端 content-length 校验。</div></div>
      <div class="qc"><div class="qh"><i class="fas fa-check-circle" style="color:var(--status-answered-text);font-size:.7rem;margin-top:4px"></i><div class="qt">加密算法能否自选？</div><i class="fas fa-check-circle s1" style="color:var(--status-answered-text);font-size:.6rem"></i></div><div class="qd">可，设置里选「加密算法」，默认 AES-256-GCM。</div></div>
    </div>`
}
function flashcardsPanel(){
  return `<div class="st">闪记卡片</div>
    <div class="fg">
      <div class="fi"><div class="front">WebDAV 是什么？</div><div class="back">基于 HTTP 的分布式文件编辑与协作协议。</div><div class="meta">点击翻转</div></div>
      <div class="fi"><div class="front">本地优先意味着？</div><div class="back">数据默认存在本机，可选择性同步到私有云。</div><div class="meta">点击翻转</div></div>
    </div>`
}
function tasksPanel(){
  const col = (title, items, cls) => `<div class="kc"><div class="ch">${title}</div><div class="cb"><div class="tk">${items}</div></div></div>`
  return `<div class="st">任务看板</div><div class="kb">
    <div class="kc"><div class="ch">待办</div><div class="cb"><div class="tk"><span class="pd h"></span>整理本周资料</div><div class="tk"><span class="pd m"></span>写发布说明</div></div></div>
    <div class="kc"><div class="ch">进行中</div><div class="cb"><div class="tk"><span class="pd m"></span>重构资料库</div></div></div>
    <div class="kc"><div class="ch">已完成</div><div class="cb"><div class="tk"><span class="pd l"></span>同步校验</div></div></div>
  </div>`
}
function settingsPanel(){
  return `<div class="st">设置</div><div class="sf">
    <div class="sg2"><h4>WebDAV 同步</h4>
      <label>服务器地址</label><input value="https://dav.example.com/Daytoday">
      <label>用户名</label><input value="user">
      <label>密码</label><input type="password" value="********">
      <label>加密密码</label><input type="password" value="********">
      <label>加密算法</label>
      <select style="width:100%;padding:7px 10px;border:1px solid var(--border-input);border-radius:10px;font-size:.82rem;margin-bottom:8px"><option>AES-256-GCM</option><option>AES-128-GCM</option></select>
      <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" checked> 允许明文上传附件（未设加密密码时）</label>
    </div>
  </div>`
}

// ===== 资料面板 =====
function filesPanel(){
  const atts = ATTACHMENTS
  const folders = Array.from(new Set([...atts.map(a=>a.folder).filter(Boolean), '工作','学习'])).sort()
  const counts = {}
  atts.forEach(a => { counts[a.folder||''] = (counts[a.folder||'']||0)+1 })

  const filtered = atts.filter(a => {
    if (state.activeFolder === ACTIVE_ALL) return true
    if (state.activeFolder === '') return !a.folder
    return a.folder === state.activeFolder
  }).filter(a => !state.fileSearch || a.filename.toLowerCase().includes(state.fileSearch.toLowerCase()))

  const uploadBar = `<div class="file-upload-bar">
    <button class="btn btn-primary" onclick="alert('演示：打开文件选择 / 拖拽到此处即可上传')"><i class="fas fa-upload"></i> 选择文件上传</button>
    <span class="file-hint">支持任意文件类型，也可拖拽文件到此处</span>
    <button class="btn btn-secondary" style="margin-left:auto;padding:6px 12px;font-size:.74rem" onclick="toggleCloud()"><i class="fas fa-cloud-download-alt"></i> 查看云端附件</button>
  </div>`

  const cloud = window.__cloudOpen ? cloudList() : ''

  const toolbar = `<div class="file-toolbar">
    <button class="btn ${state.selectMode?'btn-primary':'btn-secondary'}" style="padding:4px 10px;font-size:.72rem" onclick="toggleSelectMode()"><i class="fas fa-check-square"></i> ${state.selectMode?'退出多选':'多选'}</button>
    <div class="file-search-box"><i class="fas fa-search"></i><input placeholder="搜索资料名..." value="${state.fileSearch}" oninput="state.fileSearch=this.value;render()"></div>
    <span class="file-cur-label">${curLabel(counts)}</span>
  </div>`

  const capsules = `<div class="file-folder-bar"><div class="file-folders">
    <span class="file-capsule ${state.activeFolder===ACTIVE_ALL?'active':''}" onclick="state.activeFolder='${ACTIVE_ALL}';render()">全部 (${atts.length})</span>
    <span class="file-capsule ${state.activeFolder===''?'active':''}" onclick="state.activeFolder='';render()"><span class="color-dot" style="background:#9aa0aa"></span>未分类 (${counts['']||0})</span>
    ${folders.map(f=>`<span class="file-capsule ${state.activeFolder===f?'active':''}" onclick="state.activeFolder='${f}';render()"><span class="color-dot" style="background:${folderColor(f)}"></span>${f} (${counts[f]||0})</span>`).join('')}
    ${state.addingFolder ? `<span class="file-capsule-input-wrap"><input class="file-capsule-input" id="newFolderInput" value="${state.newFolder}" oninput="state.newFolder=this.value" onkeydown="if(event.key==='Enter')createFolder()"><button class="btn btn-primary" style="padding:3px 8px;font-size:.66rem" onclick="createFolder()"><i class="fas fa-check"></i></button></span>`
      : `<span class="file-capsule capsule-add" onclick="state.addingFolder=true;render()"><i class="fas fa-plus"></i> 新建</span>`}
    <span class="file-capsule ${state.manageOpen?'active':''}" onclick="state.manageOpen=!state.manageOpen;render()"><i class="fas fa-sliders-h"></i> 管理</span>
  </div></div>`

  const manage = state.manageOpen ? `<div class="file-manage-panel">
    <div class="file-manage-head"><span><i class="fas fa-folder-gear"></i> 文件夹管理</span><span class="file-manage-hint">未分类资料默认进收件箱</span></div>
    <div class="file-manage-row"><span class="manage-dot" style="background:#9aa0aa"></span><span class="manage-name">未分类</span><span class="manage-count">${counts['']||0}</span><button class="btn btn-secondary m-btn" onclick="alert('演示：打开文件夹')"><i class="fas fa-folder-open"></i></button></div>
    ${folders.map(f=>`<div class="file-manage-row">${state.renameFolder===f ? `<input class="file-capsule-input" value="${state.renameVal}" oninput="state.renameVal=this.value" onkeydown="if(event.key==='Enter')commitRename('${f}')"><button class="btn btn-primary m-btn" onclick="commitRename('${f}')"><i class="fas fa-check"></i></button>` : `<span class="manage-dot" style="background:${folderColor(f)}"></span><span class="manage-name">${f}</span><span class="manage-count">${counts[f]||0}</span><button class="btn btn-secondary m-btn" onclick="alert('演示：打开文件夹')"><i class="fas fa-folder-open"></i></button><button class="btn btn-secondary m-btn" onclick="state.renameFolder='${f}';state.renameVal='${f}';render()">重命名</button><button class="btn btn-secondary m-btn" onclick="askDelFolder('${f}')">删除</button>`}</div>`).join('')}
  </div>` : ''

  const batch = state.selectMode ? `<div class="file-batch-bar">
    <label class="file-batch-all" onclick="toggleSelectAll()"><i class="far ${allSelected(filtered)?'fa-check-square':'fa-square'}"></i> 全选</label>
    <span class="file-batch-count">已选 ${state.selected.size} 项</span>
    <div class="file-batch-actions">
      <button class="btn btn-secondary" onclick="openMove(null)"><i class="fas fa-arrow-right"></i> 迁移</button>
      <button class="btn btn-secondary" onclick="openLink(-1)"><i class="fas fa-link"></i> 关联</button>
      <button class="btn btn-secondary" onclick="alert('演示：批量上传到云端')"><i class="fas fa-cloud-upload-alt"></i> 上传</button>
      <button class="btn btn-secondary" onclick="askDelBatch()"><i class="fas fa-trash"></i> 删除</button>
    </div>
  </div>` : ''

  const list = filtered.length === 0
    ? `<div class="em">${state.fileSearch ? `未找到匹配「${state.fileSearch}」的资料` : state.activeFolder==='' ? '「未分类」暂无资料，新上传的资料会出现在这里' : state.activeFolder===ACTIVE_ALL ? '暂无资料' : `「${state.activeFolder}」暂无资料`}</div>`
    : `<div class="file-list">${filtered.map(a => fileItem(a)).join('')}</div>`

  return `<div class="st">资料上传</div>${uploadBar}${cloud}${toolbar}${capsules}${manage}${batch}${list}`
}

function curLabel(counts){
  if (state.activeFolder === ACTIVE_ALL) return `全部（${ATTACHMENTS.length}）`
  if (state.activeFolder === '') return `未分类（${counts['']||0}）`
  return `${state.activeFolder}（${counts[state.activeFolder]||0}）`
}

function fileItem(a){
  const sel = state.selectMode
  const checked = state.selected.has(a.id)
  const linkedNotes = a.note_ids.map(id => NOTES.find(n=>n.id===id)).filter(Boolean).map(n=>`<span class="file-note-tag">${n.text.slice(0,20)}<i class="fas fa-times" onclick="unlink(${a.id},${n.id})"></i></span>`).join('')
  return `<div class="file-item ${sel&&checked?'selected':''}" onclick="${sel?`toggleSel(${a.id})`:''}">
    ${sel?`<div class="file-select-box"><i class="far ${checked?'fa-check-square':'fa-square'}"></i></div>`:''}
    <div class="file-icon"><i class="fas fa-file"></i></div>
    <div class="file-info">
      <div class="file-name">${a.filename}</div>
      <div class="file-meta">
        <span>${fmt(a.size)}</span><span>${a.created}</span>
        ${a.folder?`<span><span class="color-dot" style="background:${folderColor(a.folder)}"></span> ${a.folder}</span>`:`<span><span class="color-dot" style="background:#9aa0aa"></span> 未分类</span>`}
      </div>
      <div class="file-notes">${linkedNotes}</div>
    </div>
    ${sel?'':`<div class="file-actions">
      <button class="btn btn-secondary" title="打开所在文件夹" onclick="alert('演示：打开文件夹')"><i class="fas fa-folder-open"></i></button>
      <button class="btn btn-secondary" title="上传到云端" onclick="alert('演示：上传到云端')"><i class="fas fa-cloud-upload-alt"></i></button>
      <button class="btn btn-secondary" title="关联笔记" onclick="openLink(${a.id})"><i class="fas fa-link"></i></button>
      <button class="btn btn-secondary" title="移动" onclick="openMove([${a.id}])"><i class="fas fa-arrow-right"></i></button>
      <button class="btn btn-secondary" title="删除" onclick="askDelOne(${a.id})"><i class="fas fa-trash"></i></button>
    </div>`}
  </div>`
}

function cloudList(){
  const items = REMOTE.map(r=>`<div class="cloud-att-item"><i class="fas fa-file"></i><span class="cloud-att-name">${r.filename}</span><span class="cloud-att-size">${fmt(r.size)}</span>${r.exists_local?'<span class="cloud-att-badge local"><i class="fas fa-check"></i> 本地已存在</span>':'<span class="cloud-att-badge remote">仅云端</span>'}<button class="btn btn-secondary cloud-att-dl" style="padding:2px 8px;font-size:.66rem" onclick="alert('演示：下载到${state.activeFolder&&state.activeFolder!==ACTIVE_ALL&&state.activeFolder!==''?`「${state.activeFolder}」`:'本地'}')"><i class="fas fa-download"></i></button></div>`).join('')
  return `<div class="cloud-att-list"><div class="cloud-att-head"><span><i class="fas fa-cloud" style="color:var(--accent);margin-right:6px"></i>云端附件（${REMOTE.length}）</span>
    <button class="btn btn-ghost" style="padding:2px 8px;font-size:.72rem" onclick="window.__cloudOpen=false;render()"><i class="fas fa-times"></i></button></div>${items}</div>`
}

// ===== 交互 =====
function afterRender(){
  document.querySelectorAll('.fi').forEach(fi=>{
    fi.addEventListener('click', ()=>{ const b=fi.querySelector('.back'); if(b) b.classList.toggle('show'); })
  })
}
function toggleCloud(){ window.__cloudOpen = !window.__cloudOpen; render() }
function toggleSelectMode(){ state.selectMode=!state.selectMode; state.selected.clear(); render() }
function allSelected(filtered){ return filtered.length>0 && filtered.every(a=>state.selected.has(a.id)) }
function toggleSelectAll(){ const filtered = currentFiltered(); if(allSelected(filtered)) state.selected.clear(); else filtered.forEach(a=>state.selected.add(a.id)); render() }
function currentFiltered(){
  return ATTACHMENTS.filter(a=>{
    if (state.activeFolder===ACTIVE_ALL) return true
    if (state.activeFolder==='') return !a.folder
    return a.folder===state.activeFolder
  })
}
function toggleSel(id){ if(state.selected.has(id)) state.selected.delete(id); else state.selected.add(id); render() }
function createFolder(){ const name=state.newFolder.trim(); if(!name) return; if(!ATTACHMENTS.some(a=>a.folder===name)) ATTACHMENTS.push({id:Date.now(),filename:'新资料.txt',size:0,created:'2026-07-18',folder:name,note_ids:[]}); state.addingFolder=false; state.newFolder=''; state.activeFolder=name; render() }
function commitRename(old){ const v=state.renameVal.trim(); if(v&&v!==old){ ATTACHMENTS.forEach(a=>{ if(a.folder===old) a.folder=v }); } state.renameFolder=null; state.renameVal=''; render() }
function askDelFolder(name){ document.getElementById('delFolderTitle').textContent='删除文件夹「'+name+'」'; document.getElementById('delFolderDesc').textContent='该文件夹内有 '+ATTACHMENTS.filter(a=>a.folder===name).length+' 个资料，请选择如何处理：'; window.__delFolder=name; openModal('delFolderModal') }
function confirmDelFolder(mode){ const name=window.__delFolder; if(mode==='delete'){ for(let i=ATTACHMENTS.length-1;i>=0;i--){ if(ATTACHMENTS[i].folder===name) ATTACHMENTS.splice(i,1) } } else { ATTACHMENTS.forEach(a=>{ if(a.folder===name) a.folder='' }) } state.manageOpen=false; state.activeFolder=ACTIVE_ALL; closeModal('delFolderModal'); render() }
function askDelOne(id){ window.__del=[[id]]; document.getElementById('delModalDesc').textContent='确定要删除该资料吗？此操作不可恢复（将同时删除本地文件与记录）。'; showDelList([[id]]); openModal('delModal') }
function askDelBatch(){ const ids=Array.from(state.selected); if(!ids.length) return; window.__del=ids; document.getElementById('delModalDesc').textContent='确定要删除选中的 '+ids.length+' 个资料吗？'; showDelList(ids); openModal('delModal') }
function showDelList(ids){ const ul=document.getElementById('delModalList'); ul.innerHTML=ids.slice(0,5).map(id=>{ const a=ATTACHMENTS.find(x=>x.id===id); return '<li>'+(a?a.filename:'#'+id)+'</li>' }).join('') }
function confirmDel(){ const ids=window.__del||[]; for(const id of ids){ const i=ATTACHMENTS.findIndex(a=>a.id===id); if(i>=0) ATTACHMENTS.splice(i,1) } state.selected.clear(); closeModal('delModal'); render() }
function openMove(ids){ window.__moveIds = ids || Array.from(state.selected); const list=document.getElementById('moveList'); const folders=['','工作','学习']; const names=['未分类（收件箱）','工作','学习']; list.innerHTML = names.map((n,i)=>`<div class="picker-item" onclick="doMove('${folders[i]}')"><span class="color-dot" style="background:${folders[i]===''?'#9aa0aa':folderColor(folders[i])}"></span> ${n}<span class="num">${ATTACHMENTS.filter(a=>(a.folder||'')===folders[i]).length}</span></div>`).join(''); openModal('moveModal') }
function doMove(folder){ const ids=window.__moveIds||[]; ATTACHMENTS.forEach(a=>{ if(ids.includes(a.id)) a.folder=folder }); closeModal('moveModal'); render() }
function createAndMove(){ const v=document.getElementById('pickerNew').value.trim(); if(!v) return; if(!ATTACHMENTS.some(a=>a.folder===v)) ATTACHMENTS.push({id:Date.now(),filename:'新资料.txt',size:0,created:'2026-07-18',folder:v,note_ids:[]}); const ids=window.__moveIds||[]; if(!ids.length) ids.push(ATTACHMENTS[0].id); ATTACHMENTS.forEach(a=>{ if(ids.includes(a.id)) a.folder=v }); closeModal('moveModal'); state.activeFolder=v; render() }
function openLink(id){ window.__linkId=id; const batch=id===-1; document.getElementById('linkTitle').textContent=batch?`批量关联 ${state.selected.size} 个资料`:(ATTACHMENTS.find(a=>a.id===id)?.filename||'')+' · 已关联'; const list=document.getElementById('linkList'); renderLinkList(); openModal('linkModal') }
function renderLinkList(){ const q=(document.getElementById('linkSearch').value||'').toLowerCase(); const list=document.getElementById('linkList'); const cur=window.__linkId===-1?null:ATTACHMENTS.find(a=>a.id===window.__linkId); list.innerHTML=NOTES.filter(n=>!q||n.text.toLowerCase().includes(q)).map(n=>{ const linked = cur?cur.note_ids.includes(n.id):false; return `<div class="note-link-row ${linked?'linked':''}" onclick="toggleLink(${n.id})"><i class="fas ${linked?'fa-check-circle':'fa-circle'}"></i><div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.text.slice(0,40)}</div></div>` }).join('') }
function toggleLink(nid){ const cur=window.__linkId===-1?null:ATTACHMENTS.find(a=>a.id===window.__linkId); if(cur){ if(cur.note_ids.includes(nid)) cur.note_ids=cur.note_ids.filter(x=>x!==nid); else cur.note_ids.push(nid) } renderLinkList() }
function unlink(attId,nid){ const a=ATTACHMENTS.find(x=>x.id===attId); if(a) a.note_ids=a.note_ids.filter(x=>x!==nid); render() }

// ===== 弹窗通用 =====
function openModal(id){ document.getElementById(id).classList.add('op') }
function closeModal(id){ document.getElementById(id).classList.remove('op') }
document.querySelectorAll('.mo').forEach(m=>{ m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('op') }) })
document.getElementById('linkSearch').addEventListener('input', renderLinkList)

render()
</script>
</body>
</html>
